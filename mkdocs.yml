site_name: Wahly a Ojo
site_description: A community cookbook. Recipes cooked a ojo — by sight, by feel, by taste.
site_url: https://alexjf12.github.io/wahly-a-ojo/

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/book-open-variant
  features:
    - navigation.instant
    - navigation.top
    - search.highlight

extra_css:
  - stylesheets/extra.css

plugins:
  - search

hooks:
  - hooks/generate_index.py

markdown_extensions:
  - meta
  - attr_list
  - md_in_html
  - tables
