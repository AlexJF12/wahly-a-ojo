name: Build PDF Cookbook

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WeasyPrint system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libcairo2 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements-pdf.txt

      - name: Build PDF
        run: python scripts/build-pdf.py

      - name: Upload cookbook PDF
        uses: actions/upload-artifact@v4
        with:
          name: cookbook-pdf
          path: output/cookbook.pdf
          retention-days: 30
