name: Validate Recipes

on:
  pull_request:
    paths:
      - "docs/recipes/**"
      - "docs/images/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for git diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate changed recipe files
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only --diff-filter=AM \
            "origin/${{ github.base_ref }}...HEAD" -- 'docs/recipes/*.md')

          if [ -z "$CHANGED" ]; then
            echo "No recipe .md files changed in this PR."
            exit 0
          fi

          echo "Validating:"
          echo "$CHANGED"
          echo "---"
          # shellcheck disable=SC2086
          python scripts/validate-recipes.py $CHANGED
